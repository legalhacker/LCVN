services:
  postgres:
    image: postgres:15-alpine
    container_name: vietlaw-postgres
    environment:
      POSTGRES_USER: vietlaw
      POSTGRES_PASSWORD: vietlaw123
      POSTGRES_DB: vietlaw
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vietlaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: vietlaw-meilisearch
    environment:
      MEILI_MASTER_KEY: vietlaw-dev-master-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  meilisearch_data:
